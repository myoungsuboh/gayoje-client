<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 480" width="1200" height="480" role="img" aria-label="Deliverables 단계 — 산출물 모음 및 인수인계 ZIP">
  <defs>
    <linearGradient id="dlBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FCFAEE"/>
      <stop offset="100%" stop-color="#F2EAD8"/>
    </linearGradient>
    <linearGradient id="dlAccent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#8C6239"/>
      <stop offset="100%" stop-color="#C89B6A"/>
    </linearGradient>
    <filter id="dlShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#8C6239" flood-opacity="0.15"/>
    </filter>
  </defs>

  <rect width="1200" height="480" fill="url(#dlBg)"/>

  <!-- Step badge -->
  <g transform="translate(60,52)">
    <rect width="68" height="28" rx="14" fill="#8C6239"/>
    <text x="34" y="19" text-anchor="middle" font-family="IBM Plex Mono, monospace" font-size="11" font-weight="800" fill="#FFFFFF" letter-spacing="2">STEP 05</text>
  </g>

  <text x="60" y="120" font-family="Outfit, Arial, sans-serif" font-size="42" font-weight="900" fill="#2A2421" letter-spacing="-1.5">Deliverables · 산출물 인수인계</text>
  <text x="60" y="150" font-family="Pretendard, Arial, sans-serif" font-size="15" fill="#8A817C">프로젝트의 모든 GitHub Repository를 역할별로 정리하고 ZIP 인수인계 패키지로 전달합니다.</text>

  <!-- ============== Repo Grid (left, 6 cards) ============== -->
  <g transform="translate(60,200)" filter="url(#dlShadow)">
    <rect width="640" height="240" rx="22" fill="#FFFFFF" stroke="#8C6239" stroke-opacity="0.15"/>
    <text x="24" y="46" font-family="Outfit, Arial, sans-serif" font-size="13" font-weight="900" fill="#8C6239" letter-spacing="2">REGISTERED REPOS</text>

    <!-- Frontend -->
    <g transform="translate(24,68)">
      <rect width="186" height="68" rx="12" fill="#FAFBFC" stroke="#8C6239" stroke-opacity="0.18"/>
      <circle cx="20" cy="20" r="8" fill="#8C6239"/>
      <text x="34" y="24" font-family="Outfit, Arial, sans-serif" font-size="11" font-weight="900" fill="#2A2421">FRONTEND</text>
      <text x="14" y="46" font-family="IBM Plex Mono, monospace" font-size="10" fill="#8A817C">harness-fe</text>
      <text x="14" y="60" font-family="IBM Plex Mono, monospace" font-size="9" font-weight="700" fill="#5BA160">Lint 87%</text>
    </g>

    <!-- Backend -->
    <g transform="translate(226,68)">
      <rect width="186" height="68" rx="12" fill="#FAFBFC" stroke="#8C6239" stroke-opacity="0.18"/>
      <circle cx="20" cy="20" r="8" fill="#5BA160"/>
      <text x="34" y="24" font-family="Outfit, Arial, sans-serif" font-size="11" font-weight="900" fill="#2A2421">BACKEND</text>
      <text x="14" y="46" font-family="IBM Plex Mono, monospace" font-size="10" fill="#8A817C">harness-be</text>
      <text x="14" y="60" font-family="IBM Plex Mono, monospace" font-size="9" font-weight="700" fill="#5BA160">Lint 82%</text>
    </g>

    <!-- Database -->
    <g transform="translate(428,68)">
      <rect width="186" height="68" rx="12" fill="#FAFBFC" stroke="#8C6239" stroke-opacity="0.18"/>
      <circle cx="20" cy="20" r="8" fill="#5085C8"/>
      <text x="34" y="24" font-family="Outfit, Arial, sans-serif" font-size="11" font-weight="900" fill="#2A2421">DATABASE</text>
      <text x="14" y="46" font-family="IBM Plex Mono, monospace" font-size="10" fill="#8A817C">harness-schema</text>
      <text x="14" y="60" font-family="IBM Plex Mono, monospace" font-size="9" font-weight="700" fill="#8A817C">— (스키마)</text>
    </g>

    <!-- Mobile -->
    <g transform="translate(24,148)">
      <rect width="186" height="68" rx="12" fill="#FAFBFC" stroke="#8C6239" stroke-opacity="0.18"/>
      <circle cx="20" cy="20" r="8" fill="#9460B8"/>
      <text x="34" y="24" font-family="Outfit, Arial, sans-serif" font-size="11" font-weight="900" fill="#2A2421">MOBILE</text>
      <text x="14" y="46" font-family="IBM Plex Mono, monospace" font-size="10" fill="#8A817C">harness-app</text>
      <text x="14" y="60" font-family="IBM Plex Mono, monospace" font-size="9" font-weight="700" fill="#E08A3C">Lint 73%</text>
    </g>

    <!-- Infra -->
    <g transform="translate(226,148)">
      <rect width="186" height="68" rx="12" fill="#FAFBFC" stroke="#8C6239" stroke-opacity="0.18"/>
      <circle cx="20" cy="20" r="8" fill="#C77F4A"/>
      <text x="34" y="24" font-family="Outfit, Arial, sans-serif" font-size="11" font-weight="900" fill="#2A2421">INFRA</text>
      <text x="14" y="46" font-family="IBM Plex Mono, monospace" font-size="10" fill="#8A817C">harness-infra</text>
      <text x="14" y="60" font-family="IBM Plex Mono, monospace" font-size="9" font-weight="700" fill="#8A817C">— (Terraform)</text>
    </g>

    <!-- Add new -->
    <g transform="translate(428,148)">
      <rect width="186" height="68" rx="12" fill="#FFFFFF" stroke="#8C6239" stroke-opacity="0.25" stroke-dasharray="5 4"/>
      <text x="93" y="36" text-anchor="middle" font-family="Outfit, Arial, sans-serif" font-size="22" font-weight="900" fill="#8C6239">+</text>
      <text x="93" y="56" text-anchor="middle" font-family="Outfit, Arial, sans-serif" font-size="9" font-weight="700" fill="#8A817C" letter-spacing="1">REPO 추가</text>
    </g>
  </g>

  <!-- ============== Handoff ZIP (right) ============== -->
  <g transform="translate(720,200)" filter="url(#dlShadow)">
    <rect width="420" height="240" rx="22" fill="url(#dlAccent)"/>
    <text x="24" y="46" font-family="Outfit, Arial, sans-serif" font-size="13" font-weight="900" fill="#FFFFFF" letter-spacing="2" fill-opacity="0.9">HANDOFF PACKAGE</text>
    <text x="24" y="76" font-family="Outfit, Arial, sans-serif" font-size="22" font-weight="900" fill="#FFFFFF">인수인계 ZIP</text>

    <!-- ZIP icon -->
    <g transform="translate(330,28)">
      <rect width="60" height="68" rx="10" fill="#FFFFFF" fill-opacity="0.15" stroke="#FFFFFF" stroke-opacity="0.4"/>
      <rect x="22" y="0" width="14" height="14" rx="2" fill="#FFFFFF" fill-opacity="0.3"/>
      <rect x="22" y="14" width="14" height="14" rx="2" fill="#FFFFFF" fill-opacity="0.5"/>
      <rect x="22" y="28" width="14" height="14" rx="2" fill="#FFFFFF" fill-opacity="0.3"/>
      <text x="30" y="58" text-anchor="middle" font-family="IBM Plex Mono, monospace" font-size="9" font-weight="800" fill="#FFFFFF">ZIP</text>
    </g>

    <!-- 3 handoff modes -->
    <g transform="translate(24,108)">
      <rect width="372" height="32" rx="8" fill="#FFFFFF" fill-opacity="0.15"/>
      <text x="14" y="20" font-family="Outfit, Arial, sans-serif" font-size="11" font-weight="900" fill="#FFFFFF">DEV</text>
      <text x="60" y="21" font-family="Pretendard, Arial, sans-serif" font-size="11" fill="#FFFFFF" fill-opacity="0.85">Design MD + 모든 repo URL + Lint 리포트</text>
    </g>
    <g transform="translate(24,146)">
      <rect width="372" height="32" rx="8" fill="#FFFFFF" fill-opacity="0.15"/>
      <text x="14" y="20" font-family="Outfit, Arial, sans-serif" font-size="11" font-weight="900" fill="#FFFFFF">PM</text>
      <text x="60" y="21" font-family="Pretendard, Arial, sans-serif" font-size="11" fill="#FFFFFF" fill-opacity="0.85">PRD + repo별 lint 점수 요약</text>
    </g>
    <g transform="translate(24,184)">
      <rect width="372" height="32" rx="8" fill="#FFFFFF" fill-opacity="0.15"/>
      <text x="14" y="20" font-family="Outfit, Arial, sans-serif" font-size="11" font-weight="900" fill="#FFFFFF">ARCHITECT</text>
      <text x="100" y="21" font-family="Pretendard, Arial, sans-serif" font-size="11" fill="#FFFFFF" fill-opacity="0.85">SPACK + DDD + Architecture MD</text>
    </g>
  </g>
</svg>

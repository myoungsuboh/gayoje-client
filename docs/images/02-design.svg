<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 480" width="1200" height="480" role="img" aria-label="Design 단계 — SPACK · DDD · Architecture">
  <defs>
    <linearGradient id="dsBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FCFAEE"/>
      <stop offset="100%" stop-color="#F2EAD8"/>
    </linearGradient>
    <linearGradient id="dsAccent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#8C6239"/>
      <stop offset="100%" stop-color="#C89B6A"/>
    </linearGradient>
    <filter id="dsShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#8C6239" flood-opacity="0.15"/>
    </filter>
  </defs>

  <rect width="1200" height="480" fill="url(#dsBg)"/>

  <g transform="translate(60,52)">
    <rect width="68" height="28" rx="14" fill="#8C6239"/>
    <text x="34" y="19" text-anchor="middle" font-family="IBM Plex Mono, monospace" font-size="11" font-weight="800" fill="#FFFFFF" letter-spacing="2">STEP 02</text>
  </g>

  <text x="60" y="120" font-family="Outfit, Arial, sans-serif" font-size="42" font-weight="900" fill="#2A2421" letter-spacing="-1.5">Design · 시스템 설계 자동화</text>
  <text x="60" y="150" font-family="Pretendard, Arial, sans-serif" font-size="15" fill="#8A817C">PRD를 입력으로 SPACK · DDD · Architecture 3개 탭이 함께 채워집니다.</text>

  <!-- 3 large columns -->
  <g font-family="Outfit, Arial, sans-serif">
    <!-- SPACK -->
    <g transform="translate(60,200)" filter="url(#dsShadow)">
      <rect width="350" height="240" rx="22" fill="#FFFFFF" stroke="#8C6239" stroke-opacity="0.15"/>
      <rect x="24" y="24" width="56" height="56" rx="16" fill="url(#dsAccent)"/>
      <g transform="translate(36,36)" stroke="#FFFFFF" stroke-width="2.2" fill="none" stroke-linecap="round" stroke-linejoin="round">
        <path d="M16 2 L2 9 L2 22 L16 30 L30 22 L30 9 Z"/>
        <line x1="2" y1="9" x2="16" y2="16"/>
        <line x1="30" y1="9" x2="16" y2="16"/>
        <line x1="16" y1="16" x2="16" y2="30"/>
      </g>
      <text x="24" y="116" font-size="24" font-weight="900" fill="#2A2421">SPACK</text>
      <text x="24" y="140" font-family="Pretendard, Arial, sans-serif" font-size="12" fill="#8A817C" font-weight="700">비기능 요구사항 · 정책</text>
      <g font-family="Pretendard, Arial, sans-serif" font-size="12" fill="#2A2421">
        <circle cx="32" cy="170" r="3" fill="#8C6239"/><text x="44" y="174">보안 정책 / 인증 규칙</text>
        <circle cx="32" cy="192" r="3" fill="#8C6239"/><text x="44" y="196">성능 SLA · 가용성 목표</text>
        <circle cx="32" cy="214" r="3" fill="#8C6239"/><text x="44" y="218">운영 환경 · 배포 전략</text>
      </g>
    </g>

    <!-- DDD -->
    <g transform="translate(425,200)" filter="url(#dsShadow)">
      <rect width="350" height="240" rx="22" fill="#FFFFFF" stroke="#8C6239" stroke-opacity="0.15"/>
      <rect x="24" y="24" width="56" height="56" rx="16" fill="url(#dsAccent)"/>
      <g transform="translate(36,36)" stroke="#FFFFFF" stroke-width="2.2" fill="none" stroke-linecap="round" stroke-linejoin="round">
        <ellipse cx="16" cy="7" rx="13" ry="4"/>
        <path d="M3 7 L3 25 C3 27 9 29 16 29 C23 29 29 27 29 25 L29 7"/>
        <path d="M3 16 C3 18 9 20 16 20 C23 20 29 18 29 16"/>
      </g>
      <text x="24" y="116" font-size="24" font-weight="900" fill="#2A2421">DDD</text>
      <text x="24" y="140" font-family="Pretendard, Arial, sans-serif" font-size="12" fill="#8A817C" font-weight="700">도메인 모델 자동 추출</text>
      <g font-family="Pretendard, Arial, sans-serif" font-size="12" fill="#2A2421">
        <circle cx="32" cy="170" r="3" fill="#8C6239"/><text x="44" y="174">Aggregate · Entity · VO</text>
        <circle cx="32" cy="192" r="3" fill="#8C6239"/><text x="44" y="196">Bounded Context 식별</text>
        <circle cx="32" cy="214" r="3" fill="#8C6239"/><text x="44" y="218">Repository · Domain Event</text>
      </g>
    </g>

    <!-- Architecture -->
    <g transform="translate(790,200)" filter="url(#dsShadow)">
      <rect width="350" height="240" rx="22" fill="#FFFFFF" stroke="#8C6239" stroke-opacity="0.15"/>
      <rect x="24" y="24" width="56" height="56" rx="16" fill="url(#dsAccent)"/>
      <g transform="translate(36,36)" stroke="#FFFFFF" stroke-width="2.2" fill="none" stroke-linecap="round" stroke-linejoin="round">
        <rect x="2" y="2" width="11" height="11" rx="1.5"/>
        <rect x="19" y="2" width="11" height="11" rx="1.5"/>
        <rect x="2" y="19" width="11" height="11" rx="1.5"/>
        <rect x="19" y="19" width="11" height="11" rx="1.5"/>
        <line x1="13" y1="7.5" x2="19" y2="7.5"/>
        <line x1="7.5" y1="13" x2="7.5" y2="19"/>
        <line x1="24.5" y1="13" x2="24.5" y2="19"/>
      </g>
      <text x="24" y="116" font-size="24" font-weight="900" fill="#2A2421">Architecture</text>
      <text x="24" y="140" font-family="Pretendard, Arial, sans-serif" font-size="12" fill="#8A817C" font-weight="700">시스템 구조 다이어그램</text>
      <g font-family="Pretendard, Arial, sans-serif" font-size="12" fill="#2A2421">
        <circle cx="32" cy="170" r="3" fill="#8C6239"/><text x="44" y="174">컴포넌트 · 의존성 그래프</text>
        <circle cx="32" cy="192" r="3" fill="#8C6239"/><text x="44" y="196">레이어 · 통신 프로토콜</text>
        <circle cx="32" cy="214" r="3" fill="#8C6239"/><text x="44" y="218">Neo4j 그래프 시각화</text>
      </g>
    </g>
  </g>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 480" width="1200" height="480" role="img" aria-label="Lint 단계 — 규칙 준수율 검증">
  <defs>
    <linearGradient id="ltBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FCFAEE"/>
      <stop offset="100%" stop-color="#F2EAD8"/>
    </linearGradient>
    <linearGradient id="ltAccent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#8C6239"/>
      <stop offset="100%" stop-color="#C89B6A"/>
    </linearGradient>
    <linearGradient id="ringGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#5BA160"/>
      <stop offset="100%" stop-color="#8C6239"/>
    </linearGradient>
    <filter id="ltShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#8C6239" flood-opacity="0.15"/>
    </filter>
  </defs>

  <rect width="1200" height="480" fill="url(#ltBg)"/>

  <g transform="translate(60,52)">
    <rect width="68" height="28" rx="14" fill="#8C6239"/>
    <text x="34" y="19" text-anchor="middle" font-family="IBM Plex Mono, monospace" font-size="11" font-weight="800" fill="#FFFFFF" letter-spacing="2">STEP 04</text>
  </g>

  <text x="60" y="120" font-family="Outfit, Arial, sans-serif" font-size="42" font-weight="900" fill="#2A2421" letter-spacing="-1.5">Lint · 규칙 준수율 검증</text>
  <text x="60" y="150" font-family="Pretendard, Arial, sans-serif" font-size="15" fill="#8A817C">바이브 코딩으로 만든 코드가 SPACK · DDD · Architecture · Rule을 지키는지 진단합니다.</text>

  <!-- Left: Score ring -->
  <g transform="translate(80,210)" filter="url(#ltShadow)">
    <rect width="320" height="240" rx="22" fill="#FFFFFF" stroke="#8C6239" stroke-opacity="0.15"/>
    <text x="24" y="46" font-family="Outfit, Arial, sans-serif" font-size="13" font-weight="900" fill="#8C6239" letter-spacing="2">COMPLIANCE</text>

    <g transform="translate(160,140)">
      <circle cx="0" cy="0" r="78" fill="none" stroke="#F2EAD8" stroke-width="14"/>
      <!-- 87% arc: 87% of 2*PI*78 = 489.84 ≈ 426.16 / 489.84 -->
      <circle cx="0" cy="0" r="78" fill="none" stroke="url(#ringGrad)" stroke-width="14" stroke-linecap="round"
              stroke-dasharray="426 490" transform="rotate(-90)"/>
      <text x="0" y="6" text-anchor="middle" font-family="Outfit, Arial, sans-serif" font-size="44" font-weight="900" fill="#2A2421">87</text>
      <text x="0" y="32" text-anchor="middle" font-family="IBM Plex Mono, monospace" font-size="12" font-weight="700" fill="#8A817C">/ 100</text>
    </g>
    <text x="160" y="232" text-anchor="middle" font-family="Pretendard, Arial, sans-serif" font-size="12" fill="#8A817C">전체 준수율 점수</text>
  </g>

  <!-- Right: Category breakdown -->
  <g transform="translate(420,210)" filter="url(#ltShadow)">
    <rect width="720" height="240" rx="22" fill="#FFFFFF" stroke="#8C6239" stroke-opacity="0.15"/>
    <text x="24" y="46" font-family="Outfit, Arial, sans-serif" font-size="13" font-weight="900" fill="#8C6239" letter-spacing="2">CATEGORY BREAKDOWN</text>

    <!-- SPACK row -->
    <g transform="translate(24,76)">
      <text x="0" y="0" font-family="Outfit, Arial, sans-serif" font-size="14" font-weight="800" fill="#2A2421">SPACK</text>
      <text x="660" y="0" text-anchor="end" font-family="IBM Plex Mono, monospace" font-size="13" font-weight="700" fill="#5BA160">92%</text>
      <rect x="0" y="10" width="672" height="8" rx="4" fill="#F2EAD8"/>
      <rect x="0" y="10" width="618" height="8" rx="4" fill="url(#ltAccent)"/>
    </g>

    <!-- DDD row -->
    <g transform="translate(24,116)">
      <text x="0" y="0" font-family="Outfit, Arial, sans-serif" font-size="14" font-weight="800" fill="#2A2421">DDD</text>
      <text x="660" y="0" text-anchor="end" font-family="IBM Plex Mono, monospace" font-size="13" font-weight="700" fill="#5BA160">85%</text>
      <rect x="0" y="10" width="672" height="8" rx="4" fill="#F2EAD8"/>
      <rect x="0" y="10" width="571" height="8" rx="4" fill="url(#ltAccent)"/>
    </g>

    <!-- Architecture row -->
    <g transform="translate(24,156)">
      <text x="0" y="0" font-family="Outfit, Arial, sans-serif" font-size="14" font-weight="800" fill="#2A2421">Architecture</text>
      <text x="660" y="0" text-anchor="end" font-family="IBM Plex Mono, monospace" font-size="13" font-weight="700" fill="#E08A3C">78%</text>
      <rect x="0" y="10" width="672" height="8" rx="4" fill="#F2EAD8"/>
      <rect x="0" y="10" width="524" height="8" rx="4" fill="url(#ltAccent)"/>
    </g>

    <!-- Rules row -->
    <g transform="translate(24,196)">
      <text x="0" y="0" font-family="Outfit, Arial, sans-serif" font-size="14" font-weight="800" fill="#2A2421">Rules</text>
      <text x="660" y="0" text-anchor="end" font-family="IBM Plex Mono, monospace" font-size="13" font-weight="700" fill="#5BA160">93%</text>
      <rect x="0" y="10" width="672" height="8" rx="4" fill="#F2EAD8"/>
      <rect x="0" y="10" width="625" height="8" rx="4" fill="url(#ltAccent)"/>
    </g>
  </g>
</svg>

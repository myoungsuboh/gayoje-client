<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 560" width="1200" height="560" role="img" aria-label="시스템 아키텍처">
  <defs>
    <linearGradient id="arBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FCFAEE"/>
      <stop offset="100%" stop-color="#F2EAD8"/>
    </linearGradient>
    <linearGradient id="arNode" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#FBF6E8"/>
    </linearGradient>
    <linearGradient id="arAccent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#8C6239"/>
      <stop offset="100%" stop-color="#C89B6A"/>
    </linearGradient>
    <filter id="arShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#8C6239" flood-opacity="0.18"/>
    </filter>
    <marker id="arrowEnd" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 Z" fill="#8C6239"/>
    </marker>
    <marker id="arrowEndDark" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 Z" fill="#2A2421"/>
    </marker>
  </defs>

  <rect width="1200" height="560" fill="url(#arBg)"/>

  <!-- Title -->
  <text x="60" y="56" font-family="Outfit, Arial, sans-serif" font-size="28" font-weight="900" fill="#2A2421" letter-spacing="-0.8">시스템 아키텍처</text>
  <text x="60" y="80" font-family="Pretendard, Arial, sans-serif" font-size="13" fill="#8A817C">Frontend ↔ n8n Webhook ↔ Gemini AI ↔ Neo4j Graph DB</text>

  <!-- ============== NODE 1: Browser / Vue ============== -->
  <g transform="translate(60,160)" filter="url(#arShadow)">
    <rect width="240" height="240" rx="22" fill="url(#arNode)" stroke="#8C6239" stroke-opacity="0.2"/>
    <rect x="0" y="0" width="240" height="40" rx="22" fill="#2A2421"/>
    <rect x="0" y="20" width="240" height="20" fill="#2A2421"/>
    <circle cx="20" cy="20" r="5" fill="#FF5F57"/>
    <circle cx="36" cy="20" r="5" fill="#FEBC2E"/>
    <circle cx="52" cy="20" r="5" fill="#28C840"/>
    <text x="120" y="25" text-anchor="middle" font-family="IBM Plex Mono, monospace" font-size="11" font-weight="700" fill="#C89B6A">harness.app</text>

    <text x="20" y="76" font-family="IBM Plex Mono, monospace" font-size="11" font-weight="800" fill="#8C6239" letter-spacing="2">CLIENT</text>
    <text x="20" y="106" font-family="Outfit, Arial, sans-serif" font-size="22" font-weight="900" fill="#2A2421">Browser</text>

    <g font-family="Pretendard, Arial, sans-serif" font-size="12" font-weight="600" fill="#2A2421">
      <rect x="20" y="124" width="200" height="28" rx="8" fill="#F7F5EB"/>
      <text x="34" y="143">⚡ Vue 3 + Vuetify</text>
      <rect x="20" y="158" width="200" height="28" rx="8" fill="#F7F5EB"/>
      <text x="34" y="177">📦 Pinia (state)</text>
      <rect x="20" y="192" width="200" height="28" rx="8" fill="#F7F5EB"/>
      <text x="34" y="211">🔌 axios (HTTP)</text>
    </g>
  </g>

  <!-- ============== NODE 2: n8n (center) ============== -->
  <g transform="translate(420,160)" filter="url(#arShadow)">
    <rect width="280" height="240" rx="22" fill="#2A2421"/>
    <rect x="0" y="0" width="280" height="40" rx="22" fill="#1A1208"/>
    <rect x="0" y="20" width="280" height="20" fill="#1A1208"/>
    <text x="140" y="25" text-anchor="middle" font-family="IBM Plex Mono, monospace" font-size="11" font-weight="700" fill="#C89B6A">cloudflare-tunnel.dev</text>

    <text x="20" y="76" font-family="IBM Plex Mono, monospace" font-size="11" font-weight="800" fill="#C89B6A" letter-spacing="2">ORCHESTRATOR</text>
    <text x="20" y="106" font-family="Outfit, Arial, sans-serif" font-size="22" font-weight="900" fill="#FFFFFF">n8n Workflow</text>

    <g font-family="IBM Plex Mono, monospace" font-size="11" fill="#FCFAEE">
      <rect x="20" y="124" width="240" height="26" rx="6" fill="#3D2E1E"/>
      <text x="32" y="142">POST /webhook/createCps</text>
      <rect x="20" y="156" width="240" height="26" rx="6" fill="#3D2E1E"/>
      <text x="32" y="174">POST /webhook/createPrd</text>
      <rect x="20" y="188" width="240" height="26" rx="6" fill="#3D2E1E"/>
      <text x="32" y="206">POST /webhook/runLint</text>
    </g>
  </g>

  <!-- ============== NODE 3a: Gemini AI (top right) ============== -->
  <g transform="translate(820,140)" filter="url(#arShadow)">
    <rect width="320" height="120" rx="22" fill="url(#arNode)" stroke="#8C6239" stroke-opacity="0.2"/>
    <rect x="20" y="20" width="60" height="60" rx="16" fill="url(#arAccent)"/>
    <text x="50" y="58" text-anchor="middle" font-family="Outfit, Arial, sans-serif" font-size="22" font-weight="900" fill="#FFFFFF">AI</text>
    <text x="100" y="46" font-family="IBM Plex Mono, monospace" font-size="11" font-weight="800" fill="#8C6239" letter-spacing="2">REASONING</text>
    <text x="100" y="72" font-family="Outfit, Arial, sans-serif" font-size="20" font-weight="900" fill="#2A2421">Google Gemini</text>
    <text x="100" y="92" font-family="Pretendard, Arial, sans-serif" font-size="11" fill="#8A817C">5단계 산출물 AI 분석</text>
  </g>

  <!-- ============== NODE 3b: Neo4j (mid right) ============== -->
  <g transform="translate(820,300)" filter="url(#arShadow)">
    <rect width="320" height="120" rx="22" fill="url(#arNode)" stroke="#8C6239" stroke-opacity="0.2"/>
    <g transform="translate(20,20)">
      <rect width="60" height="60" rx="16" fill="url(#arAccent)"/>
      <!-- DB cylinder icon -->
      <g transform="translate(15,12)" stroke="#FFFFFF" stroke-width="2.4" fill="none" stroke-linecap="round" stroke-linejoin="round">
        <ellipse cx="15" cy="6" rx="13" ry="4"/>
        <path d="M2 6 L2 30 C2 32.5 8 35 15 35 C22 35 28 32.5 28 30 L28 6"/>
        <path d="M2 18 C2 20.5 8 22.5 15 22.5 C22 22.5 28 20.5 28 18"/>
      </g>
    </g>
    <text x="100" y="46" font-family="IBM Plex Mono, monospace" font-size="11" font-weight="800" fill="#8C6239" letter-spacing="2">STORAGE</text>
    <text x="100" y="72" font-family="Outfit, Arial, sans-serif" font-size="20" font-weight="900" fill="#2A2421">Neo4j Graph DB</text>
    <text x="100" y="92" font-family="Pretendard, Arial, sans-serif" font-size="11" fill="#8A817C">노드 · 관계 · 버전 그래프</text>
  </g>

  <!-- ============== Edge: Browser ↔ n8n (bidirectional, request/response) ============== -->
  <!-- request -->
  <line x1="300" y1="260" x2="420" y2="260" stroke="#2A2421" stroke-width="2.2" marker-end="url(#arrowEndDark)"/>
  <text x="360" y="252" text-anchor="middle" font-family="IBM Plex Mono, monospace" font-size="10" font-weight="700" fill="#2A2421">HTTP REQ</text>
  <!-- response -->
  <line x1="420" y1="300" x2="300" y2="300" stroke="#8C6239" stroke-width="2.2" marker-end="url(#arrowEnd)"/>
  <text x="360" y="318" text-anchor="middle" font-family="IBM Plex Mono, monospace" font-size="10" font-weight="700" fill="#8C6239">JSON RES</text>

  <!-- ============== Edge: n8n ↔ Gemini ============== -->
  <line x1="700" y1="220" x2="820" y2="190" stroke="#2A2421" stroke-width="2.2" marker-end="url(#arrowEndDark)"/>
  <text x="760" y="190" text-anchor="middle" font-family="IBM Plex Mono, monospace" font-size="10" font-weight="700" fill="#2A2421">PROMPT</text>
  <line x1="820" y1="218" x2="700" y2="248" stroke="#8C6239" stroke-width="2.2" marker-end="url(#arrowEnd)"/>
  <text x="760" y="252" text-anchor="middle" font-family="IBM Plex Mono, monospace" font-size="10" font-weight="700" fill="#8C6239">JSON</text>

  <!-- ============== Edge: n8n ↔ Neo4j ============== -->
  <line x1="700" y1="340" x2="820" y2="350" stroke="#2A2421" stroke-width="2.2" marker-end="url(#arrowEndDark)"/>
  <text x="760" y="335" text-anchor="middle" font-family="IBM Plex Mono, monospace" font-size="10" font-weight="700" fill="#2A2421">CYPHER</text>
  <line x1="820" y1="378" x2="700" y2="372" stroke="#8C6239" stroke-width="2.2" marker-end="url(#arrowEnd)"/>
  <text x="760" y="395" text-anchor="middle" font-family="IBM Plex Mono, monospace" font-size="10" font-weight="700" fill="#8C6239">RECORDS</text>

  <!-- Bottom info bar -->
  <g transform="translate(60,460)">
    <rect width="1080" height="64" rx="16" fill="#FFFFFF" stroke="#8C6239" stroke-opacity="0.18"/>
    <text x="24" y="26" font-family="IBM Plex Mono, monospace" font-size="10" font-weight="800" fill="#8C6239" letter-spacing="2">DATA FLOW</text>
    <text x="24" y="50" font-family="Pretendard, Arial, sans-serif" font-size="13" fill="#2A2421" font-weight="600">
      <tspan font-weight="800">①</tspan> 사용자가 화면에서 액션 →
      <tspan font-weight="800">②</tspan> Vue가 webhook 호출 →
      <tspan font-weight="800">③</tspan> n8n이 Gemini로 AI 분석 →
      <tspan font-weight="800">④</tspan> 결과를 Neo4j에 저장 →
      <tspan font-weight="800">⑤</tspan> JSON으로 응답
    </text>
  </g>
</svg>

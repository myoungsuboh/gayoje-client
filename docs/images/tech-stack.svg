<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 300" width="1200" height="300" role="img" aria-label="기술 스택">
  <defs>
    <linearGradient id="tsBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FCFAEE"/>
      <stop offset="100%" stop-color="#F2EAD8"/>
    </linearGradient>
    <linearGradient id="tsAccent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#8C6239"/>
      <stop offset="100%" stop-color="#C89B6A"/>
    </linearGradient>
    <filter id="tsShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#8C6239" flood-opacity="0.15"/>
    </filter>
  </defs>

  <rect width="1200" height="300" fill="url(#tsBg)"/>

  <text x="60" y="56" font-family="Outfit, Arial, sans-serif" font-size="28" font-weight="900" fill="#2A2421" letter-spacing="-0.8">Tech Stack</text>
  <text x="60" y="80" font-family="Pretendard, Arial, sans-serif" font-size="13" fill="#8A817C">Frontend · Backend · AI · Storage</text>

  <!-- 4 columns -->
  <g font-family="Outfit, Arial, sans-serif">
    <g transform="translate(60,120)" filter="url(#tsShadow)">
      <rect width="260" height="140" rx="18" fill="#FFFFFF" stroke="#8C6239" stroke-opacity="0.15"/>
      <text x="20" y="36" font-size="12" font-weight="900" fill="#8C6239" letter-spacing="2">FRONTEND</text>
      <g font-family="Pretendard, Arial, sans-serif" font-size="13" font-weight="600" fill="#2A2421">
        <text x="20" y="64">Vue 3 + Vuetify 3</text>
        <text x="20" y="86">Vite 5 · Pinia</text>
        <text x="20" y="108">Lucide Icons</text>
        <text x="20" y="128" fill="#8A817C" font-size="11">vue-router · neovis.js</text>
      </g>
    </g>

    <g transform="translate(340,120)" filter="url(#tsShadow)">
      <rect width="260" height="140" rx="18" fill="#FFFFFF" stroke="#8C6239" stroke-opacity="0.15"/>
      <text x="20" y="36" font-size="12" font-weight="900" fill="#8C6239" letter-spacing="2">BACKEND</text>
      <g font-family="Pretendard, Arial, sans-serif" font-size="13" font-weight="600" fill="#2A2421">
        <text x="20" y="64">n8n Workflow</text>
        <text x="20" y="86">Webhook 기반 API</text>
        <text x="20" y="108">Cloudflare Tunnel</text>
        <text x="20" y="128" fill="#8A817C" font-size="11">axios · jszip</text>
      </g>
    </g>

    <g transform="translate(620,120)" filter="url(#tsShadow)">
      <rect width="260" height="140" rx="18" fill="#FFFFFF" stroke="#8C6239" stroke-opacity="0.15"/>
      <text x="20" y="36" font-size="12" font-weight="900" fill="#8C6239" letter-spacing="2">AI</text>
      <g font-family="Pretendard, Arial, sans-serif" font-size="13" font-weight="600" fill="#2A2421">
        <text x="20" y="64">Google Gemini</text>
        <text x="20" y="86">Multi-step Prompt</text>
        <text x="20" y="108">병렬 분석 + Merge</text>
        <text x="20" y="128" fill="#8A817C" font-size="11">CPS · PRD · Lint 분석</text>
      </g>
    </g>

    <g transform="translate(900,120)" filter="url(#tsShadow)">
      <rect width="240" height="140" rx="18" fill="#FFFFFF" stroke="#8C6239" stroke-opacity="0.15"/>
      <text x="20" y="36" font-size="12" font-weight="900" fill="#8C6239" letter-spacing="2">STORAGE</text>
      <g font-family="Pretendard, Arial, sans-serif" font-size="13" font-weight="600" fill="#2A2421">
        <text x="20" y="64">Neo4j Graph DB</text>
        <text x="20" y="86">vis-network 시각화</text>
        <text x="20" y="108">버전 관리 그래프</text>
        <text x="20" y="128" fill="#8A817C" font-size="11">관계 기반 도메인</text>
      </g>
    </g>
  </g>
</svg>

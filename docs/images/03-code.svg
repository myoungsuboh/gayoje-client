<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 480" width="1200" height="480" role="img" aria-label="Code 단계 — Vibe Coding MD 가이드">
  <defs>
    <linearGradient id="cdBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FCFAEE"/>
      <stop offset="100%" stop-color="#F2EAD8"/>
    </linearGradient>
    <linearGradient id="cdAccent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#8C6239"/>
      <stop offset="100%" stop-color="#C89B6A"/>
    </linearGradient>
    <filter id="cdShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#8C6239" flood-opacity="0.15"/>
    </filter>
  </defs>

  <rect width="1200" height="480" fill="url(#cdBg)"/>

  <g transform="translate(60,52)">
    <rect width="68" height="28" rx="14" fill="#8C6239"/>
    <text x="34" y="19" text-anchor="middle" font-family="IBM Plex Mono, monospace" font-size="11" font-weight="800" fill="#FFFFFF" letter-spacing="2">STEP 03</text>
  </g>

  <text x="60" y="120" font-family="Outfit, Arial, sans-serif" font-size="42" font-weight="900" fill="#2A2421" letter-spacing="-1.5">Code · Vibe Coding</text>
  <text x="60" y="150" font-family="Pretendard, Arial, sans-serif" font-size="15" fill="#8A817C">설계 산출물을 그대로 IDE 에이전트에 던질 수 있는 MD 가이드로 변환합니다.</text>

  <!-- Left: Input panel (design artifacts) -->
  <g transform="translate(60,200)" filter="url(#cdShadow)">
    <rect width="320" height="240" rx="22" fill="#FFFFFF" stroke="#8C6239" stroke-opacity="0.15"/>
    <text x="24" y="46" font-family="Outfit, Arial, sans-serif" font-size="13" font-weight="900" fill="#8C6239" letter-spacing="2">INPUT</text>
    <text x="24" y="74" font-family="Outfit, Arial, sans-serif" font-size="20" font-weight="900" fill="#2A2421">설계 산출물</text>
    <g font-family="Pretendard, Arial, sans-serif" font-size="13">
      <rect x="24" y="96" width="272" height="32" rx="8" fill="#F7F5EB"/>
      <text x="40" y="116" fill="#2A2421" font-weight="600">📄 SPACK · 정책 명세</text>
      <rect x="24" y="136" width="272" height="32" rx="8" fill="#F7F5EB"/>
      <text x="40" y="156" fill="#2A2421" font-weight="600">🧩 DDD · 도메인 모델</text>
      <rect x="24" y="176" width="272" height="32" rx="8" fill="#F7F5EB"/>
      <text x="40" y="196" fill="#2A2421" font-weight="600">🏛 Architecture · 컴포넌트</text>
    </g>
  </g>

  <!-- Center: Vibe engine -->
  <g transform="translate(420,200)">
    <rect x="0" y="0" width="360" height="240" rx="22" fill="#2A2421" filter="url(#cdShadow)"/>
    <rect x="0" y="0" width="360" height="40" rx="22" fill="#1A1208"/>
    <rect x="0" y="20" width="360" height="20" fill="#1A1208"/>
    <circle cx="20" cy="20" r="6" fill="#FF5F57"/>
    <circle cx="40" cy="20" r="6" fill="#FEBC2E"/>
    <circle cx="60" cy="20" r="6" fill="#28C840"/>
    <text x="180" y="25" text-anchor="middle" font-family="IBM Plex Mono, monospace" font-size="11" font-weight="700" fill="#C89B6A">vibe-coding.md</text>

    <g font-family="IBM Plex Mono, monospace" font-size="12">
      <text x="22" y="74" fill="#8A817C"># 1. Setup</text>
      <text x="22" y="96" fill="#FCFAEE">- pnpm install</text>
      <text x="22" y="118" fill="#8A817C"># 2. Domain</text>
      <text x="22" y="140" fill="#C89B6A">class</text>
      <text x="68" y="140" fill="#FCFAEE">User { id, email }</text>
      <text x="22" y="162" fill="#8A817C"># 3. API</text>
      <text x="22" y="184" fill="#C89B6A">POST</text>
      <text x="64" y="184" fill="#FCFAEE">/api/orders</text>
      <text x="22" y="206" fill="#8A817C"># 4. Acceptance</text>
      <text x="22" y="226" fill="#FCFAEE">- [x] 200 OK on valid</text>
    </g>
  </g>

  <!-- Right: Output -->
  <g transform="translate(820,200)" filter="url(#cdShadow)">
    <rect width="320" height="240" rx="22" fill="#FFFFFF" stroke="#8C6239" stroke-opacity="0.15"/>
    <text x="24" y="46" font-family="Outfit, Arial, sans-serif" font-size="13" font-weight="900" fill="#8C6239" letter-spacing="2">OUTPUT</text>
    <text x="24" y="74" font-family="Outfit, Arial, sans-serif" font-size="20" font-weight="900" fill="#2A2421">IDE 에이전트 가이드</text>
    <g font-family="Pretendard, Arial, sans-serif" font-size="13">
      <rect x="24" y="96" width="272" height="32" rx="8" fill="#F7F5EB"/>
      <text x="40" y="116" fill="#2A2421" font-weight="600">⚡ Cursor / Claude Code</text>
      <rect x="24" y="136" width="272" height="32" rx="8" fill="#F7F5EB"/>
      <text x="40" y="156" fill="#2A2421" font-weight="600">📝 단계별 구현 명세</text>
      <rect x="24" y="176" width="272" height="32" rx="8" fill="#F7F5EB"/>
      <text x="40" y="196" fill="#2A2421" font-weight="600">✅ Acceptance Criteria 포함</text>
    </g>
  </g>

  <!-- Arrows (pointing right: input → engine → output) -->
  <g fill="#8C6239">
    <polygon points="386,310 386,330 412,320"/>
    <polygon points="796,310 796,330 822,320"/>
  </g>
</svg>

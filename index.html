    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Organization",
        "name": "Harness",
        "url": "https://harness-system.com",
        "logo": "https://harness-system.com/favicon.svg",
        "description": "머릿속 아이디어를 AI 가 알아듣는 기획서·설계로 정리해, Cursor·Claude 같은 AI 코딩 도구에 바로 넘길 수 있게 해주는 서비스."
      }
    </script>
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "SoftwareApplication",
        "name": "Harness",
        "applicationCategory": "DeveloperApplication",
        "operatingSystem": "Web",
        "url": "https://harness-system.com",
        "description": "비개발자도 떠오른 생각을 적기만 하면 AI 가 기획서(PRD)·시스템 설계로 정리하고, Cursor·Claude 등 AI 코딩 도구에 그대로 넘길 수 있게 해주는 도구.",
        "offers": {
          "@type": "Offer",
          "price": "0",
          "priceCurrency": "KRW",
          "description": "무료 플랜 제공 (유료 등급 별도). 쓴 만큼 과금."
        }
      }
    </script>
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "FAQPage",
        "mainEntity": [
          {
            "@type": "Question",
            "name": "코딩 하나도 모르는데, 저도 쓸 수 있나요?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "네, 그런 분들을 위해 만들었어요. 코드를 직접 짜는 게 아니라, 머릿속 생각을 적어 넣으면 AI 가 알아듣는 기획서로 정리해 주는 게 Harness 의 일입니다."
            }
          },
          {
            "@type": "Question",
            "name": "그럼 코드까지 여기서 자동으로 만들어지나요?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "아니요, 역할이 나뉘어요. Harness 는 기획·설계까지 정리해 주고, 실제 코드를 만드는 건 Cursor·Claude 같은 AI 코딩 도구가 합니다. Harness 가 정리한 걸 그대로 넘기면 원하던 게 나옵니다."
            }
          },
          {
            "@type": "Question",
            "name": "기획서로 정리되는 데 얼마나 걸려요?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "적어 넣은 양에 따라 다르지만 보통 몇 분이면 됩니다. 짧은 메모 한 장이면 4~6분 안에 정리된 기획서를 받아 볼 수 있어요."
            }
          },
          {
            "@type": "Question",
            "name": "어떤 AI 코딩 도구와 같이 쓸 수 있나요?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Cursor, Claude, GitHub Copilot 같은 도구 대부분과 잘 맞아요. Harness 가 정리한 기획·설계를 한 묶음으로 복사해서 넘기기만 하면 됩니다."
            }
          },
          {
            "@type": "Question",
            "name": "제가 적은 내용, 안전한가요?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "적어 넣은 내용은 본인 계정 안에서만 쓰이고, AI 학습에 쓰이지 않아요."
            }
          },
          {
            "@type": "Question",
            "name": "비용은 어떻게 내나요?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "쓴 만큼만 냅니다. 정리한 분량과 AI 사용량 기준으로 과금되고, 무료 플랜도 제공합니다."
            }
          }
        ]
      }
